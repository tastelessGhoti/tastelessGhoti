# 운영 환경 설정
spring:
  jpa:
    hibernate:
      ddl-auto: validate  # 운영에서는 validate만 사용
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
        default_batch_fetch_size: 100
    show-sql: false

  h2:
    console:
      enabled: false  # 운영 환경에서는 비활성화

  datasource:
    hikari:
      # HikariCP 커넥션 풀 설정
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: EcommerceHikariPool

# 로깅 설정 (운영 환경)
logging:
  level:
    com.portfolio.ecommerce: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/ecommerce-api.log
    max-size: 10MB
    max-history: 30
