spring:
  application:
    name: ecommerce-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false  # OSIV 비활성화 (성능 향상)
    properties:
      hibernate:
        default_batch_fetch_size: 100  # N+1 문제 방지
        jdbc:
          batch_size: 50  # 배치 처리 최적화
        order_inserts: true
        order_updates: true

  datasource:
    url: ${DB_URL:jdbc:h2:mem:ecommerce}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # 캐시 설정
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10분 (밀리초)
      cache-null-values: false

# JWT 설정 (환경변수로 관리)
jwt:
  secret: ${JWT_SECRET:ZWNvbW1lcmNlLXBvcnRmb2xpby1qd3Qtc2VjcmV0LWtleS1mb3ItYmFja2VuZC1kZXZlbG9wZXItbWluaW11bS01MTItYml0cw==}
  access-token-validity: ${JWT_ACCESS_VALIDITY:3600000}  # 1시간
  refresh-token-validity: ${JWT_REFRESH_VALIDITY:604800000}  # 7일

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# 액추에이터 설정 (모니터링)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
