spring:
  application:
    name: chat-search-batch

  # 데이터베이스 설정
  datasource:
    url: jdbc:postgresql://localhost:5432/chatsearch
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true

  # Batch 설정
  batch:
    job:
      enabled: true
    jdbc:
      initialize-schema: always

  # ElasticSearch 설정
  elasticsearch:
    uris: http://localhost:9200

  # Kafka 설정
  kafka:
    bootstrap-servers: localhost:9092

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

# 로깅 설정
logging:
  level:
    root: INFO
    com.chatsearch: DEBUG
    org.springframework.batch: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
