apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-search-config
data:
  # 데이터베이스 설정
  database.url: "jdbc:postgresql://postgres-service:5432/chatsearch"

  # Kafka 설정
  kafka.bootstrap-servers: "kafka-service:9092"

  # ElasticSearch 설정
  elasticsearch.uris: "http://elasticsearch-service:9200"

  # Redis 설정
  redis.host: "redis-service"
  redis.port: "6379"

  # 로깅 레벨
  logging.level.root: "INFO"
  logging.level.com.chatsearch: "DEBUG"
---
apiVersion: v1
kind: Secret
metadata:
  name: chat-search-secret
type: Opaque
data:
  # Base64 인코딩된 값
  # echo -n 'postgres' | base64
  database.username: cG9zdGdyZXM=
  database.password: cG9zdGdyZXM=
